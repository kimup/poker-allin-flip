<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="テキサスホールデムのプリフロップオールインをランダムに試せるWebアプリ"
    />
    <title>Poker All-in Flip</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Texas Hold'em All-in Flip</p>
          <h1>Poker All-in Flip</h1>
        </div>
        <div class="mode-switch" role="group" aria-label="モード切替">
          <button id="soloModeButton" class="mode-button is-active" type="button">1人</button>
          <button id="duoModeButton" class="mode-button" type="button">2人</button>
        </div>
      </header>

      <section class="table-area" aria-label="ポーカーテーブル">
        <div class="player-grid">
          <section id="playerOnePanel" class="player-panel is-winner">
            <div class="player-heading">
              <div>
                <p class="panel-label">Player 1</p>
                <h2 id="playerOneName">You</h2>
              </div>
              <span id="playerOneBadge" class="result-badge">Winner</span>
            </div>
            <div id="playerOneCards" class="cards" aria-label="Player 1 hole cards"></div>
            <p id="playerOneHand" class="hand-name"></p>
            <p id="playerOneEquity" class="equity-line"></p>
          </section>

          <section id="playerTwoPanel" class="player-panel">
            <div class="player-heading">
              <div>
                <p class="panel-label">Player 2</p>
                <h2 id="playerTwoName">CPU</h2>
              </div>
              <span id="playerTwoBadge" class="result-badge is-hidden">Winner</span>
            </div>
            <div id="playerTwoCards" class="cards" aria-label="Player 2 hole cards"></div>
            <p id="playerTwoHand" class="hand-name"></p>
            <p id="playerTwoEquity" class="equity-line"></p>
          </section>
        </div>

        <section class="board-panel">
          <div class="board-heading">
            <div>
              <p class="panel-label">Board</p>
              <h2 id="resultTitle">Preflop</h2>
            </div>
            <button id="dealButton" class="deal-button" type="button">Board Open</button>
          </div>
          <div id="boardCards" class="cards board-cards" aria-label="community cards"></div>
          <div class="street-meter" aria-label="ストリート進行">
            <span id="preflopStep" class="street-step is-active">Preflop</span>
            <span id="flopStep" class="street-step">Flop</span>
            <span id="turnStep" class="street-step">Turn</span>
            <span id="riverStep" class="street-step">River</span>
          </div>
          <p id="resultDetail" class="result-detail"></p>
        </section>
      </section>

      <section class="stats-area" aria-label="セッション統計">
        <article class="stat-card">
          <p id="playerOneStatLabel" class="stat-label">Player 1</p>
          <strong id="playerOneWins">0</strong>
          <span>wins</span>
        </article>
        <article class="stat-card">
          <p id="playerTwoStatLabel" class="stat-label">Player 2</p>
          <strong id="playerTwoWins">0</strong>
          <span>wins</span>
        </article>
        <article class="stat-card">
          <p class="stat-label">Chops</p>
          <strong id="chops">0</strong>
          <span>ties</span>
        </article>
        <article class="stat-card">
          <p class="stat-label">Player 1 Win Rate</p>
          <strong id="winRate">0%</strong>
          <span id="flipCount">0 flips</span>
        </article>
      </section>

      <section class="winner-panel" aria-label="勝敗結果">
        <p class="panel-label">Result</p>
        <strong id="winnerSummary">カードを公開してください</strong>
        <span id="winnerSubtext">勝ち数はこのブラウザに保存されます</span>
      </section>

      <section class="history-panel" aria-label="直近の結果">
        <div class="history-heading">
          <h2>Recent Flips</h2>
          <button id="resetButton" class="ghost-button" type="button">Reset</button>
        </div>
        <ol id="historyList" class="history-list"></ol>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
